<!DOCTYPE html>
<html>
<head>
    <title>AI Codebase Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-center mb-4">AI Codebase Analyzer</h1>

    <form method="POST" class="mb-4">
        <div class="input-group">
            <input type="text" name="repo" class="form-control" placeholder="Enter GitHub repo URL" required>
            <button class="btn btn-primary">Analyze</button>
        </div>
    </form>

    {% if summary %}
    <h2>Project Summary</h2>
    <div class="card mb-4 shadow-sm">
        <div class="card-body">
            <ul>
                {% for line in summary.split('\n') %}
                    <li>{{ line }}</li>
                {% endfor %}
            </ul>
        </div>
    </div>
    {% endif %}

    {% if results %}

    <h2 class="mb-3">📂 File Explanations</h2>

    {% for r in results %}
        <div class="card mb-3 shadow-sm">
            <div class="card-body">
                <h5>📄 {{ r.file }}</h5>
                <pre class="bg-dark text-light p-3 rounded">{{ r.explanation }}</pre>
            </div>
        </div>
    {% endfor %}

    <div class="card mt-4 shadow-sm">
        <div class="card-body">
            <h4>💬 Ask Questions</h4>

            <div class="input-group mb-3">
                <input type="text" id="q" class="form-control" placeholder="Ask something about the repo...">
                <button class="btn btn-success" onclick="ask()">Ask</button>
            </div>

            <div id="answer" class="p-3 bg-white border rounded"></div>
        </div>
    </div>

    <script>
        function ask() {
            let q = document.getElementById("q").value;

            fetch("/ask", {
                method: "POST",
                headers: {"Content-Type": "application/x-www-form-urlencoded"},
                body: "question=" + encodeURIComponent(q)
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById("answer").innerText = data.answer;
            });
        }
    </script>

    {% endif %}

</div>

</body>
</html>
